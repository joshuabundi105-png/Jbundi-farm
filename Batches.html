<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Management Interface</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        .batch-form { margin-bottom: 20px; }
        input, select, button { padding: 10px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Batch Management</h1>
    <div class="batch-form">
        <h2>Create New Batch</h2>
        <form id="create-batch-form">
            <label for="batch-name">Batch Name:</label>
            <input type="text" id="batch-name" name="batch-name" required>
            <label for="batch-size">Batch Size:</label>
            <input type="number" id="batch-size" name="batch-size" required>
            <label for="batch-type">Batch Type:</label>
            <select id="batch-type" name="batch-type">
                <option value="type1">Type 1</option>
                <option value="type2">Type 2</option>
            </select>
            <button type="submit">Create Batch</button>
        </form>
    </div>

    <div class="batch-list">
        <h2>Existing Batches</h2>
        <ul id="batch-list">
            <!-- List of batches will be generated here -->
        </ul>
    </div>

    <script>
        const form = document.getElementById('create-batch-form');
        const batchList = document.getElementById('batch-list');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const name = form['batch-name'].value;
            const size = form['batch-size'].value;
            const type = form['batch-type'].value;

            const li = document.createElement('li');
            li.textContent = `Batch Name: ${name}, Size: ${size}, Type: ${type}`;
            batchList.appendChild(li);

            form.reset();
        });
    </script>
</body>
</html>
